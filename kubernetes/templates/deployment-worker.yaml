apiVersion: apps/v1
kind: Deployment
metadata:
  name: leximind-worker
  namespace: {{ .Values.global.namespace }}
  labels:
    app: leximind-worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app: leximind-worker
  template:
    metadata:
      labels:
        app: leximind-worker
    spec:
      containers:
        - name: leximind-worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: leximind-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: leximind-secrets
                  key: JWT_SECRET
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: leximind-secrets
                  key: OPENAI_API_KEY
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
