apiVersion: apps/v1
kind: Deployment
metadata:
  name: leximind-api
  namespace: {{ .Values.global.namespace }}
  labels:
    app: leximind-api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app: leximind-api
  template:
    metadata:
      labels:
        app: leximind-api
    spec:
      containers:
        - name: leximind-api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: leximind-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: leximind-secrets
                  key: JWT_SECRET
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: leximind-api-service
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: leximind-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: {{ .Values.api.service.type }}
