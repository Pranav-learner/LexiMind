# Default values for leximind chart.

global:
  environment: production
  namespace: leximind

api:
  replicaCount: 3
  image:
    repository: leximind-api
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 200m
      memory: 512Mi
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
  pdb:
    enabled: true
    minAvailable: 2

worker:
  replicaCount: 2
  image:
    repository: leximind-worker
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 75

database:
  postgres:
    url: "postgresql://postgres:postgrespassword@postgres-service:5432/leximind"

cache:
  redis:
    url: "redis://redis-service:6379/0"

ingress:
  enabled: true
  className: nginx
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: leximind.example.com
      paths:
        - path: /
          pathType: Prefix
