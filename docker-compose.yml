version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: leximind-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: leximind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: leximind-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  leximind-api:
    build:
      context: ./backend
      target: production
    container_name: leximind-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/leximind
      - REDIS_URL=redis://redis:6379/0
      - LLM_MODEL=llama3
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  leximind-worker:
    build:
      context: ./backend
      target: production
    container_name: leximind-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/leximind
      - REDIS_URL=redis://redis:6379/0
      - LLM_MODEL=llama3
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"] # runs as specialized background agent/worker

volumes:
  pgdata:
  redisdata:
